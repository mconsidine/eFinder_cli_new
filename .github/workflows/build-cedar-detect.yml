name: Build cedar-detect-server (aarch64)

# Standalone cedar-detect build: runs on push so every main-branch commit
# has a tested binary artifact available for development.  Release builds
# are handled by release.yml (which chains cedar-detect + image in order);
# keeping the release trigger here would duplicate that work and race to
# attach a second copy of the binary to the same release.
on:
  push:
    branches: [main]
    paths:
      - 'cedar-detect/**'
      - '.github/workflows/build-cedar-detect.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install aarch64 cross linker
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            cedar-detect/target
          # Cache key includes the rustflags so a flag change invalidates
          # the cache (otherwise we'd reuse generic-aarch64 build artifacts).
          key: cargo-aarch64-cortex-a53-${{ hashFiles('cedar-detect/Cargo.lock') }}
          restore-keys: cargo-aarch64-cortex-a53-

      - name: Build cedar-detect-server
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          # Optimize for the Pi Zero 2W's specific CPU. ~5-10% speedup
          # over generic aarch64 builds in image-processing inner loops,
          # for the cost of one workflow line.
          RUSTFLAGS: "-C target-cpu=cortex-a53"
        working-directory: cedar-detect
        run: |
          cargo build --release \
            --target aarch64-unknown-linux-gnu \
            --bin cedar-detect-server

      - name: Strip binary
        run: |
          aarch64-linux-gnu-strip \
            cedar-detect/target/aarch64-unknown-linux-gnu/release/cedar-detect-server

      - name: Sanity check
        run: |
          file cedar-detect/target/aarch64-unknown-linux-gnu/release/cedar-detect-server \
            | grep -q "ARM aarch64"
          ls -lh cedar-detect/target/aarch64-unknown-linux-gnu/release/cedar-detect-server

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: cedar-detect-server-aarch64
          path: cedar-detect/target/aarch64-unknown-linux-gnu/release/cedar-detect-server
          retention-days: 30

