# This workflow has been superseded by release.yml, which builds both
# cedar-detect and the SD card image in a single properly-chained pipeline.
#
# The old approach here polled GitHub Releases waiting for the cedar-detect
# binary to be attached by a concurrent workflow run, which was fragile and
# caused duplicate image builds (and double-uploads) on every release.
#
# To trigger a manual image build use the "Release" workflow
# (release.yml) with the workflow_dispatch trigger and build_image=true.
#
# This file is kept as a tombstone so git history is clear about why it
# was retired.  It has no triggers and no jobs.
name: Build eFinder Pi image (RETIRED - see release.yml)
on: {}
